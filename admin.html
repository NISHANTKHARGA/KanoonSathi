<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-dashboard {
        padding: 2rem 0;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--card);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        text-align: center;
      }

      .stat-number {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--primary);
        margin-bottom: 0.5rem;
      }

      .stat-label {
        color: var(--muted);
        font-weight: 500;
      }

      .applications-section {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 2rem;
      }

      .applications-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .applications-list {
        display: grid;
        gap: 1rem;
      }

      .application-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.5rem;
        background: #fafafa;
      }

      .application-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 1rem;
      }

      .application-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .application-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .btn-approve {
        background: #10b981;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
      }

      .btn-reject {
        background: #ef4444;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
      }

      .rating-input {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .rating-input input {
        width: 60px;
        padding: 0.25rem;
        border: 1px solid var(--border);
        border-radius: 4px;
      }

      .admin-nav {
        background: var(--primary);
        color: white;
        padding: 1rem 0;
        margin-bottom: 2rem;
      }

      .admin-nav .inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .admin-nav .logo {
        color: white;
      }

      .admin-nav .menu a {
        color: white;
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
      }

      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
      }

      .modal textarea {
        width: 100%;
        min-height: 100px;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin: 1rem 0;
      }
    </style>
  </head>

  <body>
    <header class="topbar admin-nav">
      <div class="container inner">
        <a class="logo" href="index.html">KanoonSathi Admin</a>
        <nav class="menu">
          <a href="#dashboard">Dashboard</a>
          <a href="#applications">Applications</a>
          <a href="#lawyers">Lawyers</a>
        </nav>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <section class="section admin-dashboard">
      <div class="container">
        <h1 class="title">Admin Dashboard</h1>

        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-number" id="totalLawyers">0</div>
            <div class="stat-label">Total Lawyers</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="pendingApps">0</div>
            <div class="stat-label">Pending Applications</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalUsers">0</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalAppointments">0</div>
            <div class="stat-label">Total Appointments</div>
          </div>
        </div>

        <div class="applications-section">
          <div class="applications-header">
            <h2 class="title">Lawyer Applications</h2>
            <button class="btn-primary" onclick="loadApplications()">
              Refresh
            </button>
          </div>
          <div id="applicationsList" class="applications-list">
            <p>Loading applications...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Rejection Modal -->
    <div id="rejectModal" class="modal">
      <div class="modal-content">
        <h3>Reject Application</h3>
        <p>Please provide a reason for rejection:</p>
        <textarea
          id="rejectReason"
          placeholder="Enter rejection reason..."
        ></textarea>
        <div class="application-actions">
          <button class="btn-reject" onclick="confirmReject()">Reject</button>
          <button onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      let currentRejectLawyerId = null;

      // Check if user is admin
      const auth = window.KanoonAuth.getUser();
      if (!auth || auth.role !== "admin") {
        alert("Admin access required");
        location.href = "login.html";
      }

      async function loadStats() {
        try {
          // Get stats from multiple endpoints
          const [lawyers, users] = await Promise.all([
            fetchJson("/api/admin/lawyers"),
            fetchJson("/api/users"),
          ]);

          const totalLawyers = lawyers.length;
          const pendingApps = lawyers.filter(
            (l) => l.status === "pending",
          ).length;
          const totalUsers = users.length;
          const approvedLawyers = lawyers.filter(
            (l) => l.status === "approved",
          ).length;

          document.getElementById("totalLawyers").textContent = approvedLawyers;
          document.getElementById("pendingApps").textContent = pendingApps;
          document.getElementById("totalUsers").textContent = totalUsers;
          document.getElementById("totalAppointments").textContent = "0"; // TODO: Add appointment stats
        } catch (error) {
          console.error("Error loading stats:", error);
        }
      }

      async function loadApplications() {
        try {
          const applications = await fetchJson("/api/admin/lawyers");
          const container = document.getElementById("applicationsList");

          // Filter only pending applications
          const pendingApps = applications.filter(
            (app) => app.status === "pending",
          );

          if (pendingApps.length === 0) {
            container.innerHTML = "<p>No pending applications.</p>";
            return;
          }

          container.innerHTML = pendingApps
            .map(
              (app) => `
                    <div class="application-card">
                        <div class="application-header">
                            <div>
                                <h3>${escapeHtml(app.name)}</h3>
                                <p>${escapeHtml(app.email)} | ${escapeHtml(app.phone)}</p>
                            </div>
                            <div class="rating-input">
                                <label>Rating:</label>
                                <input type="number" min="0" max="5" step="0.1" value="${app.rating}"
                                       onchange="updateRating('${app.id}', this.value)">
                            </div>
                        </div>
                        <div class="application-info">
                            <div>
                                <strong>Legal Area:</strong> ${escapeHtml(app.legalArea)}<br>
                                <strong>Specialization:</strong> ${escapeHtml(app.specialization || "N/A")}<br>
                                <strong>District:</strong> ${app.district}<br>
                                <strong>Experience:</strong> ${app.experienceYears} years
                            </div>
                            <div>
                                <strong>License:</strong> ${app.licenseNumber || "N/A"}<br>
                                <strong>Availability:</strong> ${app.availability || "Flexible"}<br>
                                <strong>Languages:</strong> ${app.languages}<br>
                                <strong>Fee:</strong> NPR ${app.feeNpr}<br>
                                <strong>Applied:</strong> ${new Date(app.createdAt).toLocaleDateString()}
                            </div>
                        </div>
                        <p><strong>Bio:</strong> ${app.bio}</p>
                        <div class="application-actions">
                            <button class="btn-approve" onclick="approveApplication('${app.id}')">Approve</button>
                            <button class="btn-reject" onclick="rejectApplication('${app.id}')">Reject</button>
                        </div>
                    </div>
                `,
            )
            .join("");
        } catch (error) {
          console.error("Error loading applications:", error);
          document.getElementById("applicationsList").innerHTML =
            "<p>Error loading applications.</p>";
        }
      }

      async function approveApplication(lawyerId) {
        if (
          !confirm("Are you sure you want to approve this lawyer application?")
        )
          return;

        try {
          await fetchJson(`/api/admin/lawyers/${lawyerId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "approved", rating: 4.0 }),
          });
          alert("Lawyer approved successfully!");
          loadApplications();
          loadStats();
        } catch (error) {
          alert("Error approving application: " + error.message);
        }
      }

      function rejectApplication(lawyerId) {
        currentRejectLawyerId = lawyerId;
        document.getElementById("rejectModal").classList.add("show");
      }

      async function confirmReject() {
        const reason = document.getElementById("rejectReason").value.trim();
        if (!reason) {
          alert("Please provide a reason for rejection.");
          return;
        }

        try {
          await fetchJson(`/api/admin/lawyers/${currentRejectLawyerId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "rejected", rating: 0.0 }),
          });
          alert("Lawyer application rejected.");
          closeModal();
          loadApplications();
          loadStats();
        } catch (error) {
          alert("Error rejecting application: " + error.message);
        }
      }

      function closeModal() {
        document.getElementById("rejectModal").classList.remove("show");
        document.getElementById("rejectReason").value = "";
        currentRejectLawyerId = null;
      }

      async function updateRating(lawyerId, rating) {
        try {
          await fetchJson(`/api/admin/lawyer-rating/${lawyerId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rating: parseFloat(rating) }),
          });
          // No alert needed for rating updates
        } catch (error) {
          alert("Error updating rating: " + error.message);
        }
      }

      function logout() {
        window.KanoonAuth.logout();
        location.href = "login.html";
      }

      // Load data on page load
      loadStats();
      loadApplications();
    </script>
  </body>
</html>
