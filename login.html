<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Login</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="topbar">
        <div class="container inner">
            <a class="logo" href="index.html">KanoonSathi</a>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="consult.html">Consult AI</a>
                <a href="lawyers.html">Find Lawyer</a>
                <a href="appointments.html">My Appointments</a>
                <a href="lawyer-register.html">Lawyer Register</a>
                <a href="signup.html" class="auth-link">Signup</a>
                <a href="login.html" class="active auth-link">Login</a>
            </nav>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="card auth-card">
                <h2 class="title">Login</h2>
                <p class="subtitle">Welcome back to KanoonSathi.</p>
                <form id="loginForm" class="form-grid">
                    <input id="email" class="full" type="email" placeholder="Email" required />
                    <input id="password" class="full" type="password" placeholder="Password" required />
                    <select id="role" class="full" required>
                        <option value="user">Login as User</option>
                        <option value="lawyer">Login as Lawyer</option>
                        <option value="admin">Login as Admin</option>
                    </select>
                    <button class="btn-primary full" type="submit">Login</button>
                </form>
                <button id="googleBtn" class="btn-outline full-width" type="button">Continue with Google</button>
                <p id="msg" class="subtitle"></p>
                <p class="subtitle">New user? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </section>

    <script src="/app.js"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.menu').classList.toggle('open');
        }

        const msg = document.getElementById("msg");

        // Check if role is specified in URL
        const params = new URLSearchParams(location.search);
        const roleFromUrl = params.get('role');
        if (roleFromUrl && ['user', 'lawyer', 'admin'].includes(roleFromUrl)) {
            document.getElementById('role').value = roleFromUrl;
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const data = await fetchJson("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value.trim(),
                        password: document.getElementById("password").value,
                    role: document.getElementById("role").value
                })
                });
                window.KanoonAuth.saveAuth(data);
                location.href = "index.html";
            } catch (err) {
                msg.textContent = err.message;
                msg.style.color = "#b91c1c";
            }
        });

        document.getElementById("googleBtn").addEventListener("click", async () => {
            const email = window.prompt("Enter your Google email:");
            if (!email) return;
            const name = window.prompt("Enter your display name (optional):") || "";
            try {
                const data = await fetchJson("/api/auth/google", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, name })
                });
                window.KanoonAuth.saveAuth(data);
                location.href = "index.html";
            } catch (err) {
                msg.textContent = err.message;
                msg.style.color = "#b91c1c";
            }
        });
    </script>
</body>

</html>
