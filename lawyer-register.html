<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Lawyer Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="container inner">
        <a class="logo" href="index.html">KanoonSathi</a>
        <nav class="menu">
          <a href="index.html">Home</a>
          <a href="consult.html">Consult AI</a>
          <a href="lawyers.html">Find Lawyer</a>
          <a href="appointments.html">My Appointments</a>
          <a href="lawyer-register.html" class="active">Lawyer Register</a>
          <a href="signup.html" class="auth-link">Signup</a>
          <a href="login.html" class="auth-link">Login</a>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </header>

    <section class="section">
      <div class="container">
        <h2 class="title">Lawyer Registration</h2>
        <p class="subtitle">
          Join KanoonSathi and connect with clients across Nepal.
        </p>
        <form id="form" class="card form-grid" enctype="multipart/form-data">
          <input id="name" placeholder="Full Name" required />
          <input id="email" type="email" placeholder="Email address" required />
          <input id="phone" placeholder="Phone (+977...)" required />
          <input
            id="district"
            placeholder="District (e.g., Kathmandu)"
            required
          />
          <input id="licenseNumber" placeholder="License Number" required />
          <input id="specialization" placeholder="Specialization" required />
          <select id="legalArea" required>
            <option value="">Select Legal Area</option>
            <option>Civil Law</option>
            <option>Family Law</option>
            <option>Business Law</option>
            <option>Property Law</option>
            <option>Labor Law</option>
            <option>Criminal Law</option>
          </select>
          <input
            id="experienceYears"
            type="number"
            min="0"
            placeholder="Years of Experience"
            required
          />
          <input
            id="feeNpr"
            type="number"
            min="0"
            placeholder="Consultation Fee (NPR)"
            required
          />
          <select id="availability" required>
            <option value="">Select Availability</option>
            <option>Weekdays</option>
            <option>Weekends</option>
            <option>Morning</option>
            <option>Afternoon</option>
            <option>Evening</option>
            <option>Flexible</option>
          </select>
          <input
            class="full"
            id="languages"
            placeholder="Languages (comma separated, e.g., English, Nepali)"
            required
          />
          <div class="full">
            <label for="photo">Profile Photo</label>
            <input id="photo" type="file" accept="image/*" />
          </div>
          <div class="full">
            <label for="document">Upload Document (license/certificate)</label>
            <input
              id="document"
              type="file"
              accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
            />
          </div>
          <textarea
            class="full"
            id="bio"
            rows="4"
            placeholder="Short professional bio"
            required
          ></textarea>
          <button class="btn-primary full" type="submit">
            Submit Registration
          </button>
        </form>
        <p id="msg"></p>
      </div>
    </section>

    <script src="/app.js"></script>
    <script>
      function toggleMenu() {
        document.querySelector(".menu").classList.toggle("open");
      }

      const msg = document.getElementById("msg");
      const form = document.getElementById("form");

      function checkLawyerAuth() {
        const auth = window.KanoonAuth.getUser();
        if (!auth) {
          msg.innerHTML = '<p style="color: #b91c1c;">Please <a href="login.html?role=lawyer">login as a lawyer</a> to register your profile.</p>';
          form.style.display = "none";
          return false;
        }
        if (auth.role !== "lawyer") {
          msg.innerHTML = `<p style="color: #b91c1c;">You are logged in as a ${auth.role}, not a lawyer. Please <a href="login.html?role=lawyer">login as a lawyer</a>.</p>`;
          form.style.display = "none";
          return false;
        }
        form.style.display = "grid";
        return true;
      }

      document.getElementById("form").onsubmit = async (e) => {
        e.preventDefault();
        try {
          await fetchJson("/api/lawyers", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: document.getElementById("name").value.trim(),
              email: document.getElementById("email").value.trim(),
              phone: document.getElementById("phone").value.trim(),
              district: document.getElementById("district").value.trim(),
              legalArea: document.getElementById("legalArea").value,
              experienceYears: parseInt(
                document.getElementById("experienceYears").value,
                10,
              ),
              feeNpr: parseInt(document.getElementById("feeNpr").value, 10),
              availability: document.getElementById("availability").value,
              languages: document.getElementById("languages").value.trim(),
              licenseNumber: document
                .getElementById("licenseNumber")
                .value.trim(),
              specialization: document
                .getElementById("specialization")
                .value.trim(),
              bio: document.getElementById("bio").value.trim(),
              photo: "",
              document: "",
            }),
          });

          msg.textContent =
            "Application submitted successfully. Your profile is under review. You will be notified after admin approval.";
          msg.style.color = "green";
          form.reset();
        } catch (err) {
          msg.textContent = err.message;
          msg.style.color = "red";
        }
      };

      document.addEventListener("DOMContentLoaded", checkLawyerAuth);

      // Update navigation based on authentication status
      function updateNavigation() {
        const nav = document.querySelector("nav.menu");
        const auth = window.KanoonAuth ? window.KanoonAuth.getUser() : null;

        if (!auth) {
          return;
        }

        const authLinks = nav.querySelectorAll(".auth-link");
        authLinks.forEach((link) => (link.style.display = "none"));

        const logoutBtn = document.createElement("a");
        logoutBtn.href = "#";
        logoutBtn.textContent = "Logout";
        logoutBtn.onclick = () => window.KanoonAuth.logout();
        logoutBtn.className = "auth-link";
        nav.appendChild(logoutBtn);

        if (auth.role === "admin") {
          const adminLink = document.createElement("a");
          adminLink.href = "admin.html";
          adminLink.textContent = "Admin Dashboard";
          adminLink.className = "admin-link";
          nav.insertBefore(adminLink, nav.lastElementChild);
        }
      }

      document.addEventListener("DOMContentLoaded", updateNavigation);
    </script>
  </body>
</html>
