<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Lawyer Register</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="topbar">
        <div class="container inner">
            <a class="logo" href="index.html">KanoonSathi</a>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="consult.html">Consult AI</a>
                <a href="lawyers.html">Find Lawyer</a>
                <a href="appointments.html">My Appointments</a>
                <a href="lawyer-register.html" class="active">Lawyer Register</a>
                <a href="signup.html" class="auth-link">Signup</a>
                <a href="login.html" class="auth-link">Login</a>
            </nav>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <h2 class="title">Lawyer Registration</h2>
            <p class="subtitle">Join KanoonSathi and connect with clients across Nepal.</p>
            <form id="form" class="card form-grid" enctype="multipart/form-data">
                <input id="name" placeholder="Full Name" required />
                <input id="email" type="email" placeholder="Email address" required />
                <input id="phone" placeholder="Phone (+977...)" required />
                <input id="district" placeholder="District (e.g., Kathmandu)" required />
                <input id="licenseNumber" placeholder="License Number" required />
                <input id="specialization" placeholder="Specialization" required />
                <select id="legalArea" required>
                    <option value="">Select Legal Area</option>
                    <option>Civil Law</option>
                    <option>Family Law</option>
                    <option>Business Law</option>
                    <option>Property Law</option>
                    <option>Labor Law</option>
                    <option>Criminal Law</option>
                </select>
                <input id="experienceYears" type="number" min="0" placeholder="Years of Experience" required />
                <input id="feeNpr" type="number" min="0" placeholder="Consultation Fee (NPR)" required />
                <select id="availability" required>
                    <option value="">Select Availability</option>
                    <option>Weekdays</option>
                    <option>Weekends</option>
                    <option>Morning</option>
                    <option>Afternoon</option>
                    <option>Evening</option>
                    <option>Flexible</option>
                </select>
                <input class="full" id="languages" placeholder="Languages (comma separated, e.g., English, Nepali)" required />
                <div class="full">
                    <label for="photo">Profile Photo</label>
                    <input id="photo" type="file" accept="image/*" />
                </div>
                <div class="full">
                    <label for="document">Upload Document (license/certificate)</label>
                    <input id="document" type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
                </div>
                <textarea class="full" id="bio" rows="4" placeholder="Short professional bio" required></textarea>
                <button class="btn-primary full" type="submit">Submit Registration</button>
            </form>
            <p id="msg"></p>
        </div>
    </section>

    <script src="app.js"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.menu').classList.toggle('open');
        }

        const msg = document.getElementById("msg");
        document.getElementById("form").onsubmit = async (e) => {
            e.preventDefault();
            try {
                const formData = new FormData();
                formData.append("name", document.getElementById("name").value.trim());
                formData.append("email", document.getElementById("email").value.trim());
                formData.append("phone", document.getElementById("phone").value.trim());
                formData.append("district", document.getElementById("district").value.trim());
                formData.append("legalArea", document.getElementById("legalArea").value);
                formData.append("experienceYears", document.getElementById("experienceYears").value);
                formData.append("feeNpr", document.getElementById("feeNpr").value);
                formData.append("languages", document.getElementById("languages").value.trim());
                formData.append("licenseNumber", document.getElementById("licenseNumber").value.trim());
                formData.append("specialization", document.getElementById("specialization").value.trim());
                formData.append("availability", document.getElementById("availability").value);
                formData.append("bio", document.getElementById("bio").value.trim());
                const photoFile = document.getElementById("photo").files[0];
                const docFile = document.getElementById("document").files[0];
                if (photoFile) formData.append("photo", photoFile);
                if (docFile) formData.append("document", docFile);

                const data = await fetchJson("/api/lawyers/register", {
                    method: "POST",
                    body: formData
                });
                msg.textContent = 'Application submitted successfully. Your profile is under review. You will be notified after admin approval.';
                msg.style.color = "green";
                e.target.reset();
            } catch (err) {
                msg.textContent = err.message;
                msg.style.color = "red";
            }
        };
    </script>
</body>

</html>
