{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Sign Up</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <header class="topbar">
        <div class="container inner">
            <a class="logo" href="index.html">KanoonSathi</a>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="consult.html">Consult AI</a>
                <a href="lawyers.html">Find Lawyer</a>
                <a href="appointments.html">My Appointments</a>
                <a href="lawyer-register.html">Lawyer Register</a>
                <a href="signup.html" class="active auth-link">Signup</a>
                <a href="login.html" class="auth-link">Login</a>
            </nav>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="card auth-card">
                <h2 class="title">Create Account</h2>
                <p class="subtitle">Sign up to save your consultations and appointments.</p>
                <form id="signupForm" class="form-grid">
                    <input id="name" class="full" placeholder="Full name" required />
                    <input id="email" class="full" type="email" placeholder="Email" required />
                    <select id="role" class="full" required>
                        <option value="user">Sign up as User</option>
                        <option value="lawyer">Sign up as Lawyer</option>
                        <option value="admin">Sign up as Admin</option>
                    </select>
                    <input id="password" class="full" type="password" placeholder="Password (min 6 chars)" required />
                    <button class="btn-primary full" type="submit">Sign Up</button>
                </form>
                <button id="googleBtn" class="btn-outline full-width" type="button">Continue with Google</button>
                <p id="msg" class="subtitle"></p>
                <p class="subtitle">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </section>

    <!-- <script src="/app.js"></script> .......->this changed to static... -->  
    <script src="{% static 'app.js' %}"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.menu').classList.toggle('open');
        }

        const msg = document.getElementById("msg");
        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const data = await fetchJson("/register/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: document.getElementById("name").value.trim(),
                        email: document.getElementById("email").value.trim(),
                        password: document.getElementById("password").value,
                        role: document.getElementById("role").value
                    })
                });
                window.KanoonAuth.saveAuth(data);
                msg.textContent = 'Registration successful. Redirecting to home...';
                msg.style.color = '#16a34a';
                setTimeout(() => {
                    location.href = "index.html";
                }, 1200);
            } catch (err) {
                msg.textContent = err.message;
                msg.style.color = "#b91c1c";
            }
        });

        document.getElementById("googleBtn").addEventListener("click", async () => {
            const email = window.prompt("Enter your Google email:");
            if (!email) return;
            const name = window.prompt("Enter your display name (optional):") || "";
            try {
                const data = await fetchJson("/api/auth/google", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, name })
                });
                window.KanoonAuth.saveAuth(data);
                location.href = "index.html";
            } catch (err) {
                msg.textContent = err.message;
                msg.style.color = "#b91c1c";
            }
        });
    </script>
</body>

</html>
