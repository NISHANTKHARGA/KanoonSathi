<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | Find Lawyer</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="topbar">
        <div class="container inner">
            <a class="logo" href="index.html">KanoonSathi</a>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="consult.html">Consult AI</a>
                <a href="lawyers.html" class="active">Find Lawyer</a>
                <a href="appointments.html">My Appointments</a>
                <a href="lawyer-register.html">Lawyer Register</a>
                <a href="signup.html" class="auth-link">Signup</a>
                <a href="login.html" class="auth-link">Login</a>
            </nav>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <h2 class="title">Find the Right Lawyer</h2>
            <p class="subtitle">Browse verified lawyers across Nepal.</p>

            <!-- Filter Section -->
            <div class="card filter-card">
                <h3>Search & Filter Lawyers</h3>
                <div class="filter-grid">
                    <div class="filter-group">
                        <label for="q">Search</label>
                        <input id="q" type="text" placeholder="Name, district, or legal area..." />
                    </div>
                    <div class="filter-group">
                        <label for="area">Legal Area</label>
                        <select id="area">
                            <option value="All">All Areas</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="district">District</label>
                        <select id="district">
                            <option value="All">All Districts</option>
                            <option>Kathmandu</option>
                            <option>Lalitpur</option>
                            <option>Pokhara</option>
                            <option>Biratnagar</option>
                            <option>Butwal</option>
                            <option>Jhapa</option>
                            <option>Chitwan</option>
                            <option>Kaski</option>
                            <option>Morang</option>
                            <option>Rupandehi</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>&nbsp;</label>
                        <button id="searchBtn" class="btn-primary">Search Lawyers</button>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div id="list" class="lawyers-results"></div>
        </div>
    </section>

    <script src="/app.js"></script>
    <script>
        const list = document.getElementById("list");
        const area = document.getElementById("area");
        const district = document.getElementById("district");
        const q = document.getElementById("q");
        const searchBtn = document.getElementById("searchBtn");

        function toggleMenu() {
            document.querySelector('.menu').classList.toggle('open');
        }

        const sampleLawyers = [];

        async function initAreas() {
            try {
                const areas = await fetchJson("/api/legal-areas");
                area.innerHTML = `<option>All</option>${areas.map(a => `<option>${escapeHtml(a)}</option>`).join("")}`;
            } catch (error) {
                // Fallback to hardcoded areas
                const areas = ["Civil Law", "Family Law", "Criminal Law", "Property Law", "Labor Law", "Business Law", "Constitutional Law", "Land Rights"];
                area.innerHTML = `<option>All</option>${areas.map(a => `<option>${escapeHtml(a)}</option>`).join("")}`;
            }
        }

        function render(items) {
            if (items.length === 0) {
                list.innerHTML = '<div class="no-results"><p>No lawyers found matching your criteria. Try adjusting your search filters.</p></div>';
                return;
            }

            const categories = [...new Set(items.map(l => l.legalArea))].sort();
            list.innerHTML = categories.map(cat => {
                const catLawyers = items.filter(l => l.legalArea === cat);
                return `
                    <div class="category-section">
                        <div class="category-header">
                            <h2 class="category-title">${escapeHtml(cat)}</h2>
                            <span class="lawyer-count">${catLawyers.length} Lawyer${catLawyers.length > 1 ? 's' : ''}</span>
                        </div>
                        <div class="lawyers-grid">
                            ${catLawyers.map(l => `
                                <article class="lawyer-card">
                                    <div class="lawyer-card-header">
                                        <img class="lawyer-avatar" src="${escapeHtml(l.photoUrl || "/default-avatar.svg")}" alt="${escapeHtml(l.name)}" />
                                        <div class="lawyer-badge">${escapeHtml(cat)}</div>
                                    </div>
                                    
                                    <div class="lawyer-card-body">
                                        <h3 class="lawyer-name">${escapeHtml(l.name)}</h3>
                                        
                                        <div class="lawyer-rating">
                                            <span class="stars">${'⭐'.repeat(Math.floor(l.rating || 4.5))}</span>
                                            <span class="rating-text">${(l.rating || 4.5).toFixed(1)}/5</span>
                                        </div>
                                        
                                        <div class="lawyer-stats">
                                            <div class="stat-item">
                                                <span class="stat-label">Cases Solved</span>
                                                <span class="stat-value">${l.casesSolved || 0}</span>
                                            </div>
                                            <div class="stat-item">
                                                <span class="stat-label">Experience</span>
                                                <span class="stat-value">${l.experienceYears} yrs</span>
                                            </div>
                                        </div>
                                        
                                        <div class="lawyer-meta">
                                            <span class="meta-item">
                                                <i class="icon">📍</i>
                                                <span>${escapeHtml(l.district)}</span>
                                            </span>
                                            <span class="meta-item">
                                                <i class="icon">🎓</i>
                                                <span>${escapeHtml(l.specialization || l.legalArea)}</span>
                                            </span>
                                        </div>
                                        
                                        <p class="lawyer-bio">${escapeHtml(l.bio || "")}</p>
                                        
                                        <div class="lawyer-languages">
                                            <strong>Languages:</strong> ${l.languages || 'English, Nepali'}
                                        </div>
                                        <div class="lawyer-availability">
                                            <strong>Availability:</strong> ${escapeHtml(l.availability || 'Flexible')}
                                        </div>
                                    </div>
                                    
                                    <div class="lawyer-card-footer">
                                        <div class="fee-box">
                                            <div class="fee-label">Consultation</div>
                                            <div class="fee-amount">NPR ${l.feeNpr}</div>
                                        </div>
                                        <a class="btn-primary btn-book" href="book.html?lawyerId=${encodeURIComponent(l.id)}">Book Now</a>
                                    </div>
                                </article>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");
        }

        async function load() {
            // Show loading state
            list.innerHTML = '<div class="loading"><p>Searching for lawyers...</p></div>';

            try {
                const params = new URLSearchParams({ area: area.value, district: district.value, q: q.value });
                const data = await fetchJson(`/api/lawyers?${params.toString()}`);
                render(data);
            } catch (error) {
                list.innerHTML = '<div class="error"><p>Unable to load lawyers. Please try again later.</p></div>';
                console.error('Error loading lawyers:', error);
            }
        }

        searchBtn.onclick = load;

        (async () => {
            await initAreas();
            load();
        })();
    </script>
</body>

</html>
