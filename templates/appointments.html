{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanoonSathi | My Appointments</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>

  <body>
    <header class="topbar">
      <div class="container inner">
        <a class="logo" href="/">KanoonSathi</a>
        <nav class="menu">
          <a href="/">Home</a>
          <a href="/consult/">Consult AI</a>
          <a href="/lawyers/">Find Lawyer</a>
          <a href="/appointments/" class="active">My Appointments</a>
          <a href="/signup/" class="auth-link">Signup</a>
          <a href="/login/" class="auth-link">Login</a>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </header>

    <section class="section">
      <div class="container">
        <h2 class="title">My Appointments</h2>
        <p class="subtitle">View and manage your consultation bookings.</p>
        <div id="appointmentList" class="grid-3">
          <p>Loading appointments...</p>
        </div>
      </div>
    </section>

    <script src="{% static 'app.js' %}"></script>
    <script>
      function toggleMenu() {
        document.querySelector(".menu").classList.toggle("open");
      }

      async function loadAppointments() {
        const list = document.getElementById("appointmentList");
        try {
          // Assuming an API endpoint exists or will be created
          const appointments = await fetchJson("/api/appointments");
          if (appointments.length === 0) {
            list.innerHTML = "<p>No appointments found.</p>";
            return;
          }
          list.innerHTML = appointments
            .map(
              (a) => `
                    <article class="card">
                        <h3>Appointment with ${escapeHtml(a.lawyerName)}</h3>
                        <p><strong>Date:</strong> ${escapeHtml(a.date)}</p>
                        <p><strong>Time:</strong> ${escapeHtml(a.time)}</p>
                        <p><strong>Mode:</strong> ${escapeHtml(a.mode)}</p>
                        <span class="chip">${escapeHtml(a.status || "Pending")}</span>
                    </article>
                `,
            )
            .join("");
        } catch (err) {
          list.innerHTML = "<p>Please login to view your appointments.</p>";
        }
      }
      loadAppointments();
    </script>
  </body>
</html>
